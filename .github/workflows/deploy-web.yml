name: Deploy web (ecco)

on:
  push:
    branches:
      - claude/bold-brahmagupta-h77voi
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un único deploy a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://wgrziufchibgwowfhyhp.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_UNy7Dq_aJkx0IrLt4uQsMQ_QvS-ZrQr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # GitHub Pages sirve en /<repo>/, así que fijamos esa baseUrl solo en CI.
      - name: Set web base URL
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('app.json','utf8'));j.expo.experiments={...(j.expo.experiments||{}),baseUrl:'/${GITHUB_REPOSITORY#*/}'};fs.writeFileSync('app.json',JSON.stringify(j,null,2));"

      - name: Export web
        run: npx expo export --platform web

      - name: Prepare static output
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
