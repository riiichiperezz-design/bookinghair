name: Deploy edge functions (ecco)

on:
  push:
    branches:
      - claude/bold-brahmagupta-h77voi
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: wgrziufchibgwowfhyhp
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy moderar-audio
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Falta el secreto SUPABASE_ACCESS_TOKEN. Añádelo en"
            echo "Settings → Secrets and variables → Actions del repositorio."
            echo "Genéralo en https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          supabase functions deploy moderar-audio --project-ref "$PROJECT_REF"
